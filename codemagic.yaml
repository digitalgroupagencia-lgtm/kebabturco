# Publicar Kebab Turco na App Store sem Xcode local.
# Guia: scripts/CODEMAGIC-PASSO-A-PASSO.txt

workflows:
  kebabturco-ios-appstore:
    name: Kebab Turco — iPhone App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: kebabturco

    environment:
      # Escolhe automaticamente o perfil App Store válido para net.kebabturco.app
      # (ex.: Kebab TapToPay Final) — evita confusão com nomes kebabturco_dist / kebabturco_appstore.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: net.kebabturco.app
      vars:
        XCODE_SCHEME: App
        BUNDLE_ID: net.kebabturco.app
        DEVELOPMENT_TEAM: 4QW32SBR7H
      node: 22
      xcode: 16.4

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Instalar dependências
        script: npm ci

      - name: Compilar site + sincronizar iPhone
        script: bash scripts/sync-ios-for-release.sh

      - name: Assinatura Apple (certificados na nuvem)
        script: xcode-project use-profiles

      - name: Diagnóstico de assinatura (perfis e permissões)
        script: |
          set -e
          echo "=== Perfis instalados no build ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true
          for p in "$HOME/Library/MobileDevice/Provisioning Profiles"/*.mobileprovision; do
            [ -f "$p" ] || continue
            echo "--- $p ---"
            security cms -D -i "$p" 2>/dev/null | plutil -p - 2>/dev/null | grep -E '"Name"|application-identifier|proximity|aps-environment' || true
          done
          echo "=== Entitlements da app ==="
          plutil -p "$CM_BUILD_DIR/ios/App/App/App.entitlements" || true

      - name: Criar pacote para a App Store
        script: |
          set -o pipefail
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/ios/App/App.xcodeproj" \
            --scheme "$XCODE_SCHEME" \
            --verbose 2>&1 | tee /tmp/xcodebuild-archive.log || {
              echo "===== ÚLTIMAS 80 LINHAS DO LOG ====="
              tail -80 /tmp/xcodebuild-archive.log || true
              exit 65
            }

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild-archive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
