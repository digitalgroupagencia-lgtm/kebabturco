# Publicar Kebab Turco na App Store sem Xcode local.
# Guia: scripts/CODEMAGIC-PASSO-A-PASSO.txt

workflows:
  kebabturco-ios-appstore:
    name: Kebab Turco — iPhone App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: kebabturco

    environment:
      vars:
        XCODE_SCHEME: App
        BUNDLE_ID: net.kebabturco.app
        DEVELOPMENT_TEAM: 4QW32SBR7H
      node: 22
      xcode: 16.4

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Instalar dependências
        script: npm ci

      - name: Compilar site + sincronizar iPhone
        script: bash scripts/sync-ios-for-release.sh

      # Cria/baixa perfil NOVO via API Apple (inclui Tap to Pay se o App ID tiver a capability).
      # Não usa perfis antigos guardados no Codemagic — eram sem proximity-reader.
      - name: Perfil e certificado Apple (API automática)
        script: |
          set -euo pipefail
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --delete-stale-profiles
          keychain add-certificates
          xcode-project use-profiles

      - name: Verificar perfil Tap to Pay
        script: |
          set +e
          FOUND=0
          for dir in \
            "$HOME/Library/MobileDevice/Provisioning Profiles" \
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            for p in "$dir"/*.mobileprovision; do
              [ -f "$p" ] || continue
              echo "=== $(basename "$p") ==="
              DECODED=$(security cms -D -i "$p" 2>/dev/null)
              echo "$DECODED" | plutil -p - 2>/dev/null | grep -E '"Name"|application-identifier' || true
              if echo "$DECODED" | grep -q 'proximity-reader.payment.acceptance'; then
                echo "OK: perfil inclui Tap to Pay"
                FOUND=1
              else
                echo "AVISO: perfil SEM Tap to Pay"
              fi
            done
          done
          if [ "$FOUND" -ne 1 ]; then
            echo "ERRO: Nenhum perfil com Tap to Pay. No portal Apple, confirme Tap to Pay no identificador net.kebabturco.app e regenere."
            exit 1
          fi

      - name: Criar pacote para a App Store
        script: |
          set -eo pipefail
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App.xcarchive"
          EXPORT_PATH="$CM_BUILD_DIR/build/ios/ipa"
          mkdir -p "$(dirname "$ARCHIVE_PATH")" "$EXPORT_PATH"

          xcodebuild \
            -project "$CM_BUILD_DIR/ios/App/App.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            2>&1 | tee /tmp/xcodebuild-archive.log

          cat > /tmp/exportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>4QW32SBR7H</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist /tmp/exportOptions.plist \
            2>&1 | tee /tmp/xcodebuild-export.log

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild-archive.log
      - /tmp/xcodebuild-export.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
