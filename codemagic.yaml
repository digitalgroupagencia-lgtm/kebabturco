# Publicar Kebab Turco na App Store sem Xcode local.
# Guia: scripts/CODEMAGIC-PASSO-A-PASSO.txt
# Cartão fixo no ecrã (Live Activities): scripts/LIVE-ACTIVITIES-PASSO-A-PASSO.txt

workflows:
  kebabturco-ios-development:
    name: Kebab Turco — iPhone Development (Tap to Pay)
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: kebabturco

    environment:
      ios_signing:
        provisioning_profiles:
          - kebabturco_dev
          - kebabturco_widget_dev
        certificates:
          - kebabturco_dev
      vars:
        XCODE_SCHEME: App-Development
        BUNDLE_ID: net.kebabturco.app
        DEVELOPMENT_TEAM: 4QW32SBR7H
      node: 22
      xcode: latest

    scripts:
      - name: Instalar dependências
        script: npm ci

      - name: Compilar site + sincronizar iPhone (Development)
        script: bash scripts/sync-ios-for-development.sh

      - name: Assinatura Development (certificados guardados no Codemagic)
        script: |
          set -euo pipefail
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Verificar Tap to Pay no perfil Development
        script: |
          set -euo pipefail
          FOUND=0
          for dir in \
            "$HOME/Library/MobileDevice/Provisioning Profiles" \
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            for p in "$dir"/*.mobileprovision; do
              [ -f "$p" ] || continue
              DECODED=$(security cms -D -i "$p" 2>/dev/null)
              echo "=== $(basename "$p") ==="
              echo "$DECODED" | plutil -p - 2>/dev/null | grep -E '"Name"|proximity|aps-environment|get-task-allow' || true
              if echo "$DECODED" | grep -q 'proximity-reader.payment.acceptance'; then
                FOUND=1
              fi
            done
          done
          if [ "$FOUND" -ne 1 ]; then
            echo "ERRO: Perfil Development sem Tap to Pay."
            echo "Registe o iPhone em Dispositivos e crie perfil iOS App Development com Tap to Pay no portal Apple."
            exit 1
          fi
          echo "OK: perfil Development inclui Tap to Pay"

      - name: Criar IPA Development (instalar em iPhone registado)
        script: |
          set -eo pipefail

          DEV_PROFILE_NAME=""
          WIDGET_DEV_PROFILE_NAME=""
          for dir in \
            "$HOME/Library/MobileDevice/Provisioning Profiles" \
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            for p in "$dir"/*.mobileprovision; do
              [ -f "$p" ] || continue
              DECODED=$(security cms -D -i "$p" 2>/dev/null)
              if echo "$DECODED" | grep -q 'proximity-reader.payment.acceptance' && \
                 echo "$DECODED" | grep -q 'get-task-allow'; then
                DEV_PROFILE_NAME=$(echo "$DECODED" | plutil -extract Name raw -)
              fi
              if echo "$DECODED" | grep -q 'net.kebabturco.app.StaffOrderWidget' && \
                 echo "$DECODED" | grep -q 'get-task-allow'; then
                WIDGET_DEV_PROFILE_NAME=$(echo "$DECODED" | plutil -extract Name raw -)
              fi
            done
          done
          if [ -z "$DEV_PROFILE_NAME" ]; then
            echo "ERRO: Perfil Development não encontrado para exportação."
            exit 1
          fi
          if [ -z "$WIDGET_DEV_PROFILE_NAME" ]; then
            echo "ERRO: Perfil Development da extensão do cartão não encontrado."
            echo "Crie perfil para net.kebabturco.app.StaffOrderWidget e carregue como kebabturco_widget_dev."
            exit 1
          fi
          echo "Perfil Development: $DEV_PROFILE_NAME"
          echo "Perfil Widget Development: $WIDGET_DEV_PROFILE_NAME"

          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/xcarchive/App-dev.xcarchive"
          EXPORT_PATH="$CM_BUILD_DIR/build/ios/ipa-dev"
          mkdir -p "$(dirname "$ARCHIVE_PATH")" "$EXPORT_PATH"

          xcodebuild \
            -project "$CM_BUILD_DIR/ios/App/App.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Development" \
            2>&1 | tee /tmp/xcodebuild-dev-archive.log

          cat > /tmp/exportOptionsDev.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>4QW32SBR7H</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Development</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>net.kebabturco.app</key>
              <string>${DEV_PROFILE_NAME}</string>
              <key>net.kebabturco.app.StaffOrderWidget</key>
              <string>${WIDGET_DEV_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist /tmp/exportOptionsDev.plist \
            2>&1 | tee /tmp/xcodebuild-dev-export.log

    artifacts:
      - build/ios/ipa-dev/*.ipa
      - /tmp/xcodebuild-dev-archive.log
      - /tmp/xcodebuild-dev-export.log

  kebabturco-ios-appstore:
    name: Kebab Turco — iPhone App Store
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: kebabturco

    environment:
      groups:
        - ios_appstore
      vars:
        XCODE_SCHEME: App
        BUNDLE_ID: net.kebabturco.app
        DEVELOPMENT_TEAM: 4QW32SBR7H
      node: 22
      xcode: latest

    # iPhone: só manual no Codemagic («Start new build»). Evita uma compilação
    # nova a cada push quando a alteração é só site/Android/Google Play.

    scripts:
      - name: Confirmar Xcode 26 (obrigatório para Capacitor 8)
        script: |
          set -euo pipefail
          xcodebuild -version
          SDK=$(xcrun --sdk iphoneos --show-sdk-version)
          echo "SDK iOS: $SDK"
          XCODE_MAJOR=$(xcodebuild -version | head -1 | grep -oE '[0-9]+' | head -1)
          if [ "${XCODE_MAJOR:-0}" -lt 26 ]; then
            echo "ERRO: Capacitor 8 exige Xcode 26. Neste yaml use xcode: latest"
            exit 1
          fi

      - name: Instalar dependências
        script: npm ci

      - name: Número de build único (Apple)
        script: bash scripts/codemagic-bump-ios-build.sh

      - name: Compilar site + sincronizar iPhone
        script: bash scripts/sync-ios-for-release.sh

      - name: Criar pacote para a App Store
        script: bash scripts/codemagic-ios-appstore-build.sh

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild-build-ipa.log

    publishing:
      app_store_connect:
        auth: integration
        # Só envia o .ipa para o TestFlight (processamento Apple). Não pede revisão beta
        # automática — evita erro 422 «Another build is in review» quando há várias builds seguidas.
        submit_to_testflight: false

    # Alternativa sem Transporter no Mac: o Codemagic envia directo para a Apple.

  kebabturco-android-playstore:
    name: Kebab Turco — Android Google Play 1.2 (13)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      groups:
        - google_play
      android_signing:
        - kebabturco_play
      vars:
        PACKAGE_NAME: com.eurobusinessgroup.kebabturco
        VERSION_NAME: "1.2"
        VERSION_CODE: "13"
      node: 22
      java: 21

    # Android: só manual no Codemagic. Evita fila 19→20→21 a cada push no Git.

    scripts:
      - name: Instalar dependências
        script: npm ci

      - name: Compilar site + sincronizar Android
        script: bash scripts/sync-android-for-release.sh

      - name: Criar pacote AAB para Google Play
        script: |
          set -euo pipefail
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab

    # Sem envio automático para a Play Store: o track alpha consumia o versionCode
    # e impedia carregar o mesmo pacote em Produção. Descarrega o .aab e envia só
    # para Produção (ou usa «Promover versão» no teste fechado).
