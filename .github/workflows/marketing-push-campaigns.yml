# Campanhas push automáticas — corre diariamente às 10:00 UTC (11:00/12:00 hora espanhola).
name: Marketing push campaigns

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  run-campaigns:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar campanhas de promoção
        run: |
          curl -sS -X POST \
            "https://kvpssbhclafoymhecmuk.supabase.co/functions/v1/run-marketing-campaigns" \
            -H "Content-Type: application/json" \
            -d '{"cron": true}'
