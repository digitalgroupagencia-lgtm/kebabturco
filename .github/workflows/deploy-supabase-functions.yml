# Publica as funções de pagamento no Supabase quando há push para main.
# Uma vez: GitHub → repositório kebabturco → Settings → Secrets → Actions
#   SUPABASE_ACCESS_TOKEN = token de supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_ID   = kvpssbhclafoymhecmuk

name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy payment edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "Skip: add SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_ID in GitHub Secrets"
            exit 0
          fi
          supabase functions deploy stripe-connect-onboard --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy stripe-create-payment-intent --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy stripe-verify-payment-intent --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy stripe-terminal-connection-token --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy stripe-create-terminal-location --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy stripe-verify-terminal-location --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy admin-create-all-terminal-locations --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy configure-store-stripe-branding --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy admin-configure-all-stores-branding --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy stripe-webhook --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy send-push-notification --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy run-marketing-campaigns --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy visit-print-bridge-api --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy print-order --project-ref "$SUPABASE_PROJECT_ID"
