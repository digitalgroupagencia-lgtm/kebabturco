  <body>
    <script>
      (function () {
        var host = location.hostname.replace(/^www\./i, "").toLowerCase();
        var platformHosts = ["snaporder.digitalgroupsti.com", "admin.snaporder.es"];
        var isPlatform =
          platformHosts.indexOf(host) !== -1 ||
          host.endsWith(".lovableproject.com") ||
          host.endsWith(".lovable.app") ||
          host.endsWith(".lovable.dev");
        if (!isPlatform) return;
        var params = new URLSearchParams(location.search);
        if (params.get("preview") === "1" && params.get("tenant")) return;
        var path = location.pathname || "/";
        if (path === "/" || path === "") {
          location.replace("/auth");
          return;
        }
        var allowed =
          path.indexOf("/admin") === 0 ||
          path === "/auth" ||
          path.indexOf("/auth/") === 0 ||
          path === "/install";
        if (!allowed) location.replace("/admin");
      })();
    </script>
    <div id="boot-fallback" style="margin:0;min-height:100vh;min-height:100dvh;background:#fff"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
