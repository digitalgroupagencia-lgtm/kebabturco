      html,body{margin:0;background:#fff;color-scheme:light}
      html.dark,html[data-theme="dark"] body{background:#fff}
      #boot-fallback{position:fixed;inset:0;z-index:99999;margin:0;min-height:100dvh;background:#fff}
      #root{min-height:100dvh}
    </style>
    <meta property="og:title" content="PropioApp">

  <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/TMzzX0vwaJYICGuBjHmV7SrThgI3/social-images/social-1780930674160-0626E3C2-92FF-4853-AE36-CC5E1176601F.webp">
</head>
  <body>
    <script>
      (function () {
        var p = location.pathname || "/";
        if (p.indexOf("*") === -1) return;
        if (p.indexOf("/admin") === 0) {
          location.replace("/admin?routeHint=lovable-wildcard");
          return;
        }
        if (p.indexOf("/panel") === 0) {
          location.replace("/panel");
          return;
        }
        if (p.indexOf("/auth") === 0) {
          location.replace("/auth");
          return;
        }
        if (p.indexOf("/seller") === 0) {
          location.replace("/seller");
          return;
        }
        location.replace("/");
      })();
    </script>
    <div id="boot-fallback" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
