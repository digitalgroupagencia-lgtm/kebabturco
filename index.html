  <body>
    <script>
      (function () {
        var p = location.pathname || "/";
        if (p.indexOf("*") === -1) return;
        if (p.indexOf("/admin") === 0) {
          location.replace("/admin?routeHint=lovable-wildcard");
          return;
        }
        if (p.indexOf("/panel") === 0) {
          location.replace("/panel");
          return;
        }
        if (p.indexOf("/auth") === 0) {
          location.replace("/auth");
          return;
        }
        if (p.indexOf("/seller") === 0) {
          location.replace("/seller");
          return;
        }
        location.replace("/");
      })();
    </script>
